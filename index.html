<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agendamentos + Calendário</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 16px;
            color: #1e293b;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .header-actions button {
            background: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions button:active {
            transform: scale(0.96);
        }
        .badge-sync {
            background: #22c55e;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            -webkit-text-fill-color: white;
        }

        /* Card genérico */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            border: 1px solid #eef2f6;
            transition: all 0.2s;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Input/Textarea */
        textarea, input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
            background: #fafcff;
            transition: border 0.2s;
        }
        textarea:focus, input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* Botões */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #e9edf2;
            color: #1e293b;
        }
        .btn-success {
            background: #22c55e;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d1d5db;
            color: #1e293b;
        }
        .btn-sm {
            padding: 6px 16px;
            font-size: 0.85rem;
            width: auto;
            margin-top: 0;
        }

        /* Preview fields */
        .fields-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 18px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .field-group.full-width {
            grid-column: 1 / -1;
        }
        .field-group label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.4px;
        }
        .field-group input, .field-group textarea {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #f8fafc;
        }
        .field-group textarea {
            min-height: 60px;
        }
        .hidden {
            display: none !important;
        }

        /* Calendário */
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .calendar-header .month-year {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .calendar-nav {
            display: flex;
            gap: 12px;
        }
        .calendar-nav button {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 8px;
            color: #475569;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-grid .weekday {
            font-weight: 600;
            font-size: 0.75rem;
            color: #94a3b8;
            padding: 6px 0;
        }
        .calendar-grid .day {
            padding: 10px 0;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s;
            position: relative;
            background: transparent;
        }
        .calendar-grid .day:hover {
            background: #f1f5f9;
        }
        .calendar-grid .day.today {
            background: #e0e7ff;
            font-weight: 600;
        }
        .calendar-grid .day.has-event::after {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            background: #6366f1;
            border-radius: 50%;
            margin: 3px auto 0;
        }
        .calendar-grid .day.selected {
            background: #6366f1;
            color: white;
        }
        .calendar-grid .day.empty {
            cursor: default;
        }
        .calendar-grid .day.empty:hover {
            background: transparent;
        }
        .calendar-grid .day .event-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 0.6rem;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Lista de agendamentos do dia */
        .day-events {
            margin-top: 16px;
        }
        .day-events .event-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-left: 4px solid #6366f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .day-events .event-item .info {
            display: flex;
            flex-direction: column;
        }
        .day-events .event-item .info .title {
            font-weight: 600;
        }
        .day-events .event-item .info .sub {
            font-size: 0.85rem;
            color: #64748b;
        }
        .day-events .event-item .actions {
            display: flex;
            gap: 6px;
        }
        .day-events .event-item .actions button {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .day-events .event-item .actions button:hover {
            background: #e9edf2;
        }
        .vazio {
            color: #94a3b8;
            text-align: center;
            padding: 20px 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }

        /* Responsivo */
        @media (max-width: 500px) {
            .fields-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-actions {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>📅 Agenda+</h1>
        <div class="header-actions">
            <button id="syncNowBtn" title="Sincronizar agora">🔄 Sincronizar</button>
            <button id="addNewBtn">➕ Novo</button>
        </div>
    </div>

    <!-- Área de entrada (mensagem) -->
    <div class="card" id="inputCard">
        <h2>📥 Colar mensagem</h2>
        <textarea id="rawInput" placeholder="Cole aqui a mensagem bagunçada do WhatsApp...&#10;Ex:&#10;Data: 31/07/26&#10;Responsável: Paula Ávila&#10;Tema: Confeitaria da Minnie..."></textarea>
        <button class="btn" id="parseBtn">🔍 Interpretar</button>
    </div>

    <!-- Pré-visualização e edição -->
    <div class="card hidden" id="previewCard">
        <h2>✏️ Revisar dados</h2>
        <div id="fieldsContainer" class="fields-grid"></div>
        <div style="display: flex; gap: 10px; margin-top: 12px;">
            <button class="btn btn-success" id="saveBtn">💾 Salvar</button>
            <button class="btn btn-secondary" id="cancelPreviewBtn">Cancelar</button>
        </div>
    </div>

    <!-- Calendário -->
    <div class="card">
        <div class="calendar-header">
            <span class="month-year" id="monthYear">Janeiro 2025</span>
            <div class="calendar-nav">
                <button id="prevMonth">◀</button>
                <button id="nextMonth">▶</button>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="day-events" id="dayEvents">
            <div class="vazio">Selecione um dia para ver os agendamentos</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    (function() {
        'use strict';

        // ---------- FIREBASE CONFIG (SUBSTITUA) ----------
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const dbFirestore = firebase.firestore();
        // Para desenvolvimento local, pode desabilitar a validação SSL se necessário (não recomendado)
        // dbFirestore.settings({ experimentalForceLongPolling: true }); // se estiver em ambiente restrito

        // ---------- INDEXEDDB ----------
        const DB_NAME = 'AgendamentosDB';
        const STORE_NAME = 'agendamentos';
        let localDB = null;

        function openLocalDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 2);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    localDB = request.result;
                    resolve(localDB);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('data', 'data', { unique: false });
                    } else {
                        // Upgrade para versão 2: garantir que o índice exista
                        const store = event.target.transaction.objectStore(STORE_NAME);
                        if (!store.indexNames.contains('data')) {
                            store.createIndex('data', 'data', { unique: false });
                        }
                    }
                };
            });
        }

        function localSave(agendamento) {
            return new Promise((resolve, reject) => {
                const transaction = localDB.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                // Se tiver id, faz update; senão add
                let request;
                if (agendamento.id) {
                    request = store.put(agendamento);
                } else {
                    request = store.add(agendamento);
                }
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function localGetAll() {
            return new Promise((resolve, reject) => {
                const transaction = localDB.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function localDelete(id) {
            return new Promise((resolve, reject) => {
                const transaction = localDB.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function localClear() {
            return new Promise((resolve, reject) => {
                const transaction = localDB.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // ---------- FIREBASE CRUD ----------
        const COLLECTION = 'agendamentos';

        function firebaseSave(agendamento) {
            // Remove o id local se existir (Firestore usa id próprio)
            const data = { ...agendamento };
            delete data.id;
            // Se tiver um campo 'firestoreId', usamos para atualizar
            if (agendamento.firestoreId) {
                return dbFirestore.collection(COLLECTION).doc(agendamento.firestoreId).set(data);
            } else {
                return dbFirestore.collection(COLLECTION).add(data);
            }
        }

        function firebaseDelete(firestoreId) {
            return dbFirestore.collection(COLLECTION).doc(firestoreId).delete();
        }

        function firebaseGetAll() {
            return dbFirestore.collection(COLLECTION).get();
        }

        // ---------- SINCRONIZAÇÃO ----------
        async function syncFromFirebase() {
            try {
                const snapshot = await firebaseGetAll();
                // Limpa local
                await localClear();
                const items = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.firestoreId = doc.id;
                    // Não podemos ter id autoincrement, então removemos se existir
                    delete data.id;
                    items.push(data);
                });
                // Salva cada um localmente
                for (let item of items) {
                    await localSave(item);
                }
                showToast('Sincronizado com a nuvem ✅');
                return items;
            } catch (e) {
                console.error('Erro ao sincronizar:', e);
                showToast('Erro na sincronização. Verifique sua internet.');
                throw e;
            }
        }

        // Função para forçar sincronização (manual)
        async function syncAll() {
            await syncFromFirebase();
            await refreshCalendarAndList();
        }

        // ---------- Mapeamento de campos ----------
        const FIELD_MAP = {
            'data': 'data',
            'responsável': 'responsavel',
            'cel': 'celular',
            'cel.': 'celular',
            'tema': 'tema',
            'hora que a turma ruanito inicia': 'hora_inicio',
            'local': 'local',
            'valor pago': 'valor_pago',
            'pacote contratado': 'pacote',
            'alguma observação': 'observacao',
            'valor restante': 'valor_restante',
            'nome do(a) aniversariante': 'aniversariante',
            'obs.': 'obs',
            'obs': 'obs'
        };

        const DB_FIELDS = [
            'data', 'responsavel', 'celular', 'tema', 'hora_inicio',
            'local', 'valor_pago', 'pacote', 'observacao', 'valor_restante',
            'aniversariante', 'obs'
        ];

        const FIELD_LABELS = {
            data: 'Data',
            responsavel: 'Responsável',
            celular: 'Celular',
            tema: 'Tema',
            hora_inicio: 'Hora início',
            local: 'Local',
            valor_pago: 'Valor pago',
            pacote: 'Pacote',
            observacao: 'Observação',
            valor_restante: 'Valor restante',
            aniversariante: 'Aniversariante',
            obs: 'Observações extras'
        };

        // ---------- PARSING ----------
        function parseMessage(text) {
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
            const result = {};
            let currentKey = null;
            let currentValue = '';

            for (let line of lines) {
                const colonIndex = line.indexOf(':');
                if (colonIndex !== -1) {
                    if (currentKey) {
                        result[currentKey] = currentValue.trim();
                        currentKey = null;
                        currentValue = '';
                    }
                    const key = line.substring(0, colonIndex).trim().toLowerCase();
                    const value = line.substring(colonIndex + 1).trim();
                    const mappedKey = mapKey(key);
                    if (mappedKey) {
                        if (mappedKey === 'observacao' || mappedKey === 'obs') {
                            currentKey = mappedKey;
                            currentValue = value;
                        } else {
                            result[mappedKey] = value;
                        }
                    } else {
                        if (currentKey) {
                            currentValue += ' ' + line;
                        } else {
                            if (!result.observacao) result.observacao = '';
                            result.observacao += ' ' + line;
                        }
                    }
                } else {
                    if (currentKey) {
                        currentValue += ' ' + line;
                    } else {
                        if (!result.observacao) result.observacao = '';
                        result.observacao += ' ' + line;
                    }
                }
            }
            if (currentKey) {
                result[currentKey] = currentValue.trim();
            }
            for (let key in result) {
                result[key] = result[key].trim();
            }
            return result;
        }

        function mapKey(rawKey) {
            let key = rawKey.toLowerCase().replace(/[^a-záéíóúàâêôãõç ]/g, '').trim();
            if (FIELD_MAP[key]) return FIELD_MAP[key];
            for (let pattern in FIELD_MAP) {
                if (key.includes(pattern) || pattern.includes(key)) {
                    return FIELD_MAP[pattern];
                }
            }
            if (key.includes('data')) return 'data';
            if (key.includes('respons') || key.includes('resp')) return 'responsavel';
            if (key.includes('cel') || key.includes('telefone')) return 'celular';
            if (key.includes('tema')) return 'tema';
            if (key.includes('hora')) return 'hora_inicio';
            if (key.includes('local')) return 'local';
            if (key.includes('valor pago')) return 'valor_pago';
            if (key.includes('pacote')) return 'pacote';
            if (key.includes('observa')) return 'observacao';
            if (key.includes('restante')) return 'valor_restante';
            if (key.includes('anivers') || key.includes('aniversariante')) return 'aniversariante';
            if (key.includes('obs')) return 'obs';
            return null;
        }

        // ---------- CALENDÁRIO ----------
        let currentDate = new Date(); // mês atual
        let selectedDate = null; // data selecionada (string 'YYYY-MM-DD')
        let allEvents = []; // array de agendamentos

        function formatDateKey(year, month, day) {
            return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        }

        function getEventsForDate(dateKey) {
            return allEvents.filter(e => e.data && e.data.trim() !== '' && formatDateFromString(e.data) === dateKey);
        }

        function formatDateFromString(dateStr) {
            // tenta interpretar dd/mm/aa ou dd/mm/yyyy
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                let day = parseInt(parts[0]);
                let month = parseInt(parts[1]) - 1;
                let year = parseInt(parts[2]);
                if (year < 100) year += 2000;
                return formatDateKey(year, month, day);
            }
            return null;
        }

        function renderCalendar(year, month) {
            const grid = document.getElementById('calendarGrid');
            const monthYear = document.getElementById('monthYear');
            const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            monthYear.textContent = `${months[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay(); // 0=domingo
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const todayKey = formatDateKey(today.getFullYear(), today.getMonth(), today.getDate());

            let html = '';
            const weekdays = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
            weekdays.forEach(d => html += `<div class="weekday">${d}</div>`);

            // Dias vazios antes do primeiro dia
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="day empty"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = formatDateKey(year, month, d);
                const events = getEventsForDate(dateKey);
                const hasEvent = events.length > 0;
                const isToday = (dateKey === todayKey);
                const isSelected = (dateKey === selectedDate);
                let classes = 'day';
                if (isToday) classes += ' today';
                if (hasEvent) classes += ' has-event';
                if (isSelected) classes += ' selected';
                html += `<div class="${classes}" data-date="${dateKey}">${d}`;
                if (hasEvent) {
                    html += `<span class="event-count">${events.length}</span>`;
                }
                html += `</div>`;
            }

            grid.innerHTML = html;

            // Event listeners nos dias
            document.querySelectorAll('.day:not(.empty)').forEach(el => {
                el.addEventListener('click', function() {
                    const dateKey = this.dataset.date;
                    selectedDate = dateKey;
                    renderCalendar(year, month); // re-render para atualizar seleção
                    renderDayEvents(dateKey);
                });
            });

            // Se houver data selecionada, mostrar eventos
            if (selectedDate) {
                renderDayEvents(selectedDate);
            } else {
                document.getElementById('dayEvents').innerHTML = `<div class="vazio">Selecione um dia para ver os agendamentos</div>`;
            }
        }

        function renderDayEvents(dateKey) {
            const container = document.getElementById('dayEvents');
            const events = getEventsForDate(dateKey);
            if (events.length === 0) {
                container.innerHTML = `<div class="vazio">Nenhum agendamento para este dia</div>`;
                return;
            }
            let html = '';
            events.forEach(ev => {
                const titulo = ev.aniversariante || 'Evento sem nome';
                const responsavel = ev.responsavel || '—';
                const hora = ev.hora_inicio || '';
                const id = ev.firestoreId || ev.id;
                html += `
                    <div class="event-item">
                        <div class="info">
                            <span class="title">🎉 ${titulo}</span>
                            <span class="sub">👤 ${responsavel} ${hora ? '⏰ '+hora : ''}</span>
                        </div>
                        <div class="actions">
                            <button onclick="editEvent('${id}')" title="Editar">✏️</button>
                            <button onclick="deleteEvent('${id}')" title="Excluir">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Funções globais para os botões de evento
        window.editEvent = async function(firestoreId) {
            // Encontra o evento na lista
            const ev = allEvents.find(e => e.firestoreId === firestoreId);
            if (!ev) return showToast('Evento não encontrado');
            // Preenche o preview
            showPreview(ev);
            // Marca como edição
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.textContent = '💾 Atualizar';
            saveBtn.dataset.editId = firestoreId;
        };

        window.deleteEvent = async function(firestoreId) {
            if (!confirm('Excluir este agendamento?')) return;
            try {
                await firebaseDelete(firestoreId);
                await localDeleteByFirestoreId(firestoreId);
                showToast('Excluído');
                await refreshCalendarAndList();
            } catch (e) {
                showToast('Erro ao excluir');
                console.error(e);
            }
        };

        async function localDeleteByFirestoreId(firestoreId) {
            // Busca local e deleta
            const all = await localGetAll();
            const item = all.find(e => e.firestoreId === firestoreId);
            if (item && item.id) {
                await localDelete(item.id);
            }
        }

        // ---------- PREVIEW ----------
        function showPreview(data) {
            const container = document.getElementById('fieldsContainer');
            container.innerHTML = '';
            let hasData = false;
            DB_FIELDS.forEach(field => {
                const value = data[field] || '';
                if (value) hasData = true;
                const div = document.createElement('div');
                div.className = 'field-group' + (field === 'observacao' || field === 'obs' ? ' full-width' : '');
                const label = document.createElement('label');
                label.textContent = FIELD_LABELS[field] || field;
                const input = document.createElement('input');
                if (field === 'observacao' || field === 'obs') {
                    const textarea = document.createElement('textarea');
                    textarea.rows = 2;
                    textarea.value = value;
                    textarea.id = 'field-' + field;
                    div.appendChild(label);
                    div.appendChild(textarea);
                } else {
                    input.type = 'text';
                    input.value = value;
                    input.id = 'field-' + field;
                    div.appendChild(label);
                    div.appendChild(input);
                }
                container.appendChild(div);
            });
            if (!hasData) {
                container.innerHTML = '<div class="vazio" style="grid-column:1/-1;">Nenhum dado reconhecido.</div>';
            }
            document.getElementById('previewCard').classList.remove('hidden');
            document.getElementById('inputCard').classList.add('hidden');
        }

        function collectPreviewData() {
            const data = {};
            DB_FIELDS.forEach(field => {
                const el = document.getElementById('field-' + field);
                if (el) data[field] = el.value.trim();
            });
            return data;
        }

        // ---------- REFRESH ----------
        async function refreshCalendarAndList() {
            // Carrega todos do local
            const items = await localGetAll();
            allEvents = items;
            // Atualiza calendário
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            renderCalendar(year, month);
        }

        // ---------- TOAST ----------
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ---------- EVENT LISTENERS ----------
        document.addEventListener('DOMContentLoaded', async () => {
            await openLocalDB();

            // Tentar sincronizar automaticamente
            try {
                await syncFromFirebase();
            } catch (e) {
                // Fallback para dados locais
                console.warn('Usando dados locais (offline)');
            }
            await refreshCalendarAndList();

            // Navegação do calendário
            document.getElementById('prevMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                renderCalendar(year, month);
            });
            document.getElementById('nextMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                renderCalendar(year, month);
            });

            // Botão Novo -> mostra o card de entrada
            document.getElementById('addNewBtn').addEventListener('click', () => {
                document.getElementById('inputCard').classList.remove('hidden');
                document.getElementById('previewCard').classList.add('hidden');
                document.getElementById('rawInput').value = '';
                document.getElementById('rawInput').focus();
                const saveBtn = document.getElementById('saveBtn');
                saveBtn.textContent = '💾 Salvar';
                saveBtn.dataset.editId = '';
            });

            // Botão Interpretar
            document.getElementById('parseBtn').addEventListener('click', () => {
                const raw = document.getElementById('rawInput').value;
                if (!raw.trim()) {
                    showToast('Cole uma mensagem primeiro');
                    return;
                }
                const parsed = parseMessage(raw);
                showPreview(parsed);
            });

            // Cancelar preview
            document.getElementById('cancelPreviewBtn').addEventListener('click', () => {
                document.getElementById('previewCard').classList.add('hidden');
                document.getElementById('inputCard').classList.remove('hidden');
            });

            // Salvar
            document.getElementById('saveBtn').addEventListener('click', async () => {
                const data = collectPreviewData();
                const hasData = DB_FIELDS.some(f => data[f] && data[f].trim() !== '');
                if (!hasData) {
                    showToast('Nenhum dado para salvar');
                    return;
                }

                try {
                    const editId = document.getElementById('saveBtn').dataset.editId;
                    // Se tiver editId, é uma atualização
                    let firestoreId = editId;
                    let savedDocRef;
                    if (editId) {
                        // Atualiza no Firebase
                        await firebaseSave({ ...data, firestoreId: editId });
                        // Atualiza local
                        await localDeleteByFirestoreId(editId);
                        const newData = { ...data, firestoreId: editId };
                        await localSave(newData);
                        showToast('Atualizado!');
                    } else {
                        // Salva no Firebase primeiro
                        const docRef = await firebaseSave(data);
                        firestoreId = docRef.id;
                        // Salva local com firestoreId
                        const newData = { ...data, firestoreId: firestoreId };
                        await localSave(newData);
                        showToast('Salvo com sucesso!');
                    }

                    document.getElementById('previewCard').classList.add('hidden');
                    document.getElementById('inputCard').classList.remove('hidden');
                    document.getElementById('rawInput').value = '';
                    await refreshCalendarAndList();
                } catch (e) {
                    console.error(e);
                    showToast('Erro ao salvar. Tente novamente.');
                }
            });

            // Sincronizar manual
            document.getElementById('syncNowBtn').addEventListener('click', async () => {
                await syncAll();
            });
        });

        // Função para sincronizar e atualizar
        async function syncAll() {
            try {
                await syncFromFirebase();
                await refreshCalendarAndList();
            } catch (e) {
                // já tratado no syncFromFirebase
            }
        }

    })();
</script>
</body>
</html>
