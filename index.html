    <style>

        .toast {

        .btn-sync {

    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>📅 Agenda<span style="-webkit-text-fill-color: #1a4b8c;">+</span> <small>IA</small></h1>
            <div class="flex-row">
                <div class="sync-status" id="syncStatus">
                    <span class="dot online" id="syncDot"></span>
                    <span id="syncLabel">Sincronizado</span>
                </div>
                <button class="btn-sync" id="forceSyncBtn">🔄</button>
            </div>
        </div>

        <!-- CALENDÁRIO -->
        <div class="card">
            <div class="card-title">
                📆 Calendário
                <span class="badge" id="eventCount">0 eventos</span>
            </div>
            <div class="calendar-nav">
                <button id="prevMonth">◀</button>
                <span class="month-year" id="monthYear">Maio 2026</span>

            </div>

        <!-- ADICIONAR NOVO -->
        <div class="card">
            <div class="card-title">✏️ Novo agendamento</div>
            <textarea id="rawInput" placeholder="Cole a mensagem bagunçada do WhatsApp...&#10;Ex:&#10;Data: 31/07/26&#10;Responsável: Paula Ávila&#10;..."></textarea>
            <button class="btn" id="parseBtn">🔍 Interpretar</button>

            <!-- Preview (oculto) -->
            <div id="previewCard" class="hidden" style="margin-top:16px;">
                <div id="fieldsContainer" class="extracted-fields"></div>
                <div class="btn-group">
                    <button class="btn btn-success" id="saveBtn">💾 Salvar</button>
                    <button class="btn btn-secondary" id="cancelPreviewBtn">Cancelar</button>

            </div>
        </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT -->
    <script type="module">
        // ----- IMPORTS FIREBASE -----
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, query, orderBy, getDocs } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyDMwdtyx3zWHwCHtalq572E_FyrF4f-drM",
            authDomain: "corretorpro-84422.firebaseapp.com",
            projectId: "corretorpro-84422",
            storageBucket: "corretorpro-84422.firebasestorage.app",
            messagingSenderId: "577827555644",
            appId: "1:577827555644:web:6394517f3ba8a8230ab639",
            measurementId: "G-YWXW1KFCW1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const eventsCollection = collection(db, 'agendamentos');

        // ----- ESTADO -----
        let allEvents = [];
        let currentDate = new Date();
        let selectedDate = null;
        let editingId = null;
        let unsubscribe = null; // para o snapshot

        // DOM refs
        const calendarGrid = document.getElementById('calendarGrid');
        const monthYear = document.getElementById('monthYear');
        const dayEventsDiv = document.getElementById('dayEvents');
        const rawInput = document.getElementById('rawInput');
        const parseBtn = document.getElementById('parseBtn');
        const previewCard = document.getElementById('previewCard');
        const fieldsContainer = document.getElementById('fieldsContainer');
        const saveBtn = document.getElementById('saveBtn');
        const cancelPreviewBtn = document.getElementById('cancelPreviewBtn');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');
        const toast = document.getElementById('toast');
        const syncDot = document.getElementById('syncDot');
        const syncLabel = document.getElementById('syncLabel');
        const eventCount = document.getElementById('eventCount');
        const forceSyncBtn = document.getElementById('forceSyncBtn');

        // ----- TOAST -----
        function showToast(msg, duration = 2500) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ----- SYNC STATUS -----
        function setSyncStatus(state) {
            // state: 'online', 'offline', 'error'
            syncDot.className = 'dot ' + state;
            if (state === 'online') syncLabel.textContent = 'Sincronizado';
            else if (state === 'offline') syncLabel.textContent = 'Offline';
            else if (state === 'error') syncLabel.textContent = 'Erro';
        }

        // ----- FORMATAÇÃO -----
        function formatDateKey(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function formatDisplayDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        // ----- MAPEAMENTO DE CAMPOS (igual) -----
        const FIELD_MAP = {
            'data': 'data',
            'responsável': 'responsavel',
            'cel': 'celular',
            'cel.': 'celular',
            'tema': 'tema',
            'hora que a turma ruanito inicia': 'hora_inicio',
            'local': 'local',
            'valor pago': 'valor_pago',
            'pacote contratado': 'pacote',
            'alguma observação': 'observacao',
            'valor restante': 'valor_restante',
            'nome do(a) aniversariante': 'aniversariante',
            'obs.': 'obs',
            'obs': 'obs'
        };
        const DB_FIELDS = [
            'data', 'responsavel', 'celular', 'tema', 'hora_inicio',
            'local', 'valor_pago', 'pacote', 'observacao', 'valor_restante',
            'aniversariante', 'obs'
        ];
        const FIELD_LABELS = {
            data: 'Data',
            responsavel: 'Responsável',
            celular: 'Celular',
            tema: 'Tema',
            hora_inicio: 'Hora início',
            local: 'Local',
            valor_pago: 'Valor pago',
            pacote: 'Pacote',
            observacao: 'Observação',
            valor_restante: 'Valor restante',
            aniversariante: 'Aniversariante',
            obs: 'Observações extras'
        };

        function mapKey(rawKey) {
            let key = rawKey.toLowerCase().replace(/[^a-záéíóúàâêôãõç ]/g, '').trim();
            if (FIELD_MAP[key]) return FIELD_MAP[key];
            for (let pattern in FIELD_MAP) {
                if (key.includes(pattern) || pattern.includes(key)) return FIELD_MAP[pattern];
            }
            if (key.includes('data')) return 'data';
            if (key.includes('respons') || key.includes('resp')) return 'responsavel';
            if (key.includes('cel') || key.includes('telefone')) return 'celular';
            if (key.includes('tema')) return 'tema';
            if (key.includes('hora')) return 'hora_inicio';
            if (key.includes('local')) return 'local';
            if (key.includes('valor pago')) return 'valor_pago';
            if (key.includes('pacote')) return 'pacote';
            if (key.includes('observa')) return 'observacao';
            if (key.includes('restante')) return 'valor_restante';
            if (key.includes('anivers') || key.includes('aniversariante')) return 'aniversariante';
            if (key.includes('obs')) return 'obs';
            return null;
        }

        function parseMessage(text) {
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
            const result = {};
            let currentKey = null;
            let currentValue = '';

            for (let line of lines) {
                const colonIndex = line.indexOf(':');
                if (colonIndex !== -1) {
                    if (currentKey) {
                        result[currentKey] = currentValue.trim();
                        currentKey = null;
                        currentValue = '';
                    }
                    const key = line.substring(0, colonIndex).trim().toLowerCase();
                    const value = line.substring(colonIndex + 1).trim();
                    const mappedKey = mapKey(key);
                    if (mappedKey) {
                        if (mappedKey === 'observacao' || mappedKey === 'obs') {
                            currentKey = mappedKey;
                            currentValue = value;
                        } else {
                            result[mappedKey] = value;
                        }
                    } else {
                        if (currentKey) {
                            currentValue += ' ' + line;
                        } else {
                            if (!result.observacao) result.observacao = '';
                            result.observacao += ' ' + line;
                        }
                    }
                } else {
                    if (currentKey) {
                        currentValue += ' ' + line;
                    } else {
                        if (!result.observacao) result.observacao = '';
                        result.observacao += ' ' + line;
                    }
                }
            }
            if (currentKey) {
                result[currentKey] = currentValue.trim();
            }
            for (let key in result) {
                result[key] = result[key].trim();
            }
            return result;
        }

        // ----- RENDER CALENDÁRIO -----
        function renderCalendar(events, year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();
            const todayStr = formatDateKey(today.getFullYear(), today.getMonth(), today.getDate());

            const eventsMap = {};
            events.forEach(ev => {
                if (ev.data) {
                    const d = ev.data.trim();
                    let dateKey = null;
                    if (/^\d{4}-\d{2}-\d{2}$/.test(d)) {
                        dateKey = d;
                    } else {
                        const parts = d.split('/');
                        if (parts.length === 3) {
                            let day = parseInt(parts[0]);
                            let monthNum = parseInt(parts[1]) - 1;
                            let yearNum = parseInt(parts[2]);
                            if (yearNum < 100) yearNum += 2000;
                            if (!isNaN(day) && !isNaN(monthNum) && !isNaN(yearNum)) {
                                dateKey = formatDateKey(yearNum, monthNum, day);
                            }
                        }
                    }
                    if (dateKey) {
                        if (!eventsMap[dateKey]) eventsMap[dateKey] = [];
                        eventsMap[dateKey].push(ev);
                    }
                }
            });

            let html = '';
            const weekdays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            weekdays.forEach(w => {
                html += `<div class="weekday">${w}</div>`;
            });

            const startOffset = firstDay;
            for (let i = daysInPrevMonth - startOffset + 1; i <= daysInPrevMonth; i++) {
                html += `<div class="day other-month">${i}</div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = formatDateKey(year, month, d);
                const isToday = dateKey === todayStr;
                const hasEvent = eventsMap[dateKey] && eventsMap[dateKey].length > 0;
                const isSelected = dateKey === selectedDate;
                let classes = 'day';
                if (isToday) classes += ' today';
                if (hasEvent) classes += ' has-event';
                if (isSelected) classes += ' selected';
                html += `<div class="${classes}" data-date="${dateKey}">${d}</div>`;
            }

            const totalCells = startOffset + daysInMonth;
            const remaining = (7 - (totalCells % 7)) % 7;
            for (let d = 1; d <= remaining; d++) {
                html += `<div class="day other-month">${d}</div>`;
            }

            calendarGrid.innerHTML = html;
            monthYear.textContent = new Date(year, month).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

            let count = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = formatDateKey(year, month, d);
                if (eventsMap[dateKey]) count += eventsMap[dateKey].length;
            }
            eventCount.textContent = count + ' evento' + (count !== 1 ? 's' : '');

            document.querySelectorAll('.day:not(.other-month)').forEach(el => {
                el.addEventListener('click', () => {
                    const date = el.dataset.date;
                    if (date) {
                        selectedDate = date;
                        renderCalendar(events, year, month);
                        renderDayEvents(events, date);
                    }
                });
            });

            if (selectedDate) {
                renderDayEvents(events, selectedDate);
            } else {
                const firstEventDate = Object.keys(eventsMap).sort()[0];
                if (firstEventDate) {
                    selectedDate = firstEventDate;
                    renderCalendar(events, year, month);
                } else {
                    selectedDate = todayStr;
                    renderCalendar(events, year, month);
                }
            }
        }

        // ----- RENDER EVENTOS DO DIA -----
        function renderDayEvents(events, dateKey) {
            const filtered = events.filter(ev => {
                if (!ev.data) return false;
                const d = ev.data.trim();
                if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d === dateKey;
                const parts = d.split('/');
                if (parts.length === 3) {
                    let day = parseInt(parts[0]);
                    let monthNum = parseInt(parts[1]) - 1;
                    let yearNum = parseInt(parts[2]);
                    if (yearNum < 100) yearNum += 2000;
                    if (!isNaN(day) && !isNaN(monthNum) && !isNaN(yearNum)) {
                        return formatDateKey(yearNum, monthNum, day) === dateKey;
                    }
                }
                return false;
            });

            if (filtered.length === 0) {
                dayEventsDiv.innerHTML = `<div class="empty">📭 Nenhum agendamento para ${formatDisplayDate(dateKey)}</div>`;
                return;
            }

            let html = `<div style="margin-bottom:8px;font-weight:500;">📋 ${filtered.length} agendamento(s) em ${formatDisplayDate(dateKey)}</div>`;
            filtered.forEach(ev => {
                const nome = ev.aniversariante || 'Evento';
                const resp = ev.responsavel || '';
                const local = ev.local || '';
                const hora = ev.hora_inicio || '';
                const id = ev.id;
                html += `
                    <div class="event-item">
                        <div class="info">
                            <div class="name">🎉 ${nome}</div>
                            <div class="detail">${resp} ${local ? '· ' + local : ''} ${hora ? '· ' + hora : ''}</div>
                        </div>
                        <div class="actions">
                            <button data-id="${id}" class="edit-btn" title="Editar">✏️</button>
                            <button data-id="${id}" class="delete-btn" title="Excluir">🗑️</button>
                        </div>
                    </div>
                `;
            });
            dayEventsDiv.innerHTML = html;

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const ev = allEvents.find(e => e.id === id);
                    if (ev) loadEventForEdit(ev);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    if (confirm('Excluir este agendamento?')) {
                        try {
                            await deleteDoc(doc(db, 'agendamentos', id));
                            showToast('Excluído com sucesso');
                            // snapshot atualiza
                        } catch (e) {
                            showToast('Erro ao excluir: ' + e.message);
                            console.error(e);
                        }
                    }
                });
            });
        }

        // ----- CARREGAR PARA EDIÇÃO -----
        function loadEventForEdit(ev) {
            const container = fieldsContainer;
            container.innerHTML = '';
            DB_FIELDS.forEach(field => {
                const value = ev[field] || '';
                const div = document.createElement('div');
                div.className = 'field' + (field === 'observacao' || field === 'obs' ? ' field-full' : '');
                const label = document.createElement('label');
                label.textContent = FIELD_LABELS[field] || field;
                const input = document.createElement('input');
                if (field === 'observacao' || field === 'obs') {
                    const textarea = document.createElement('textarea');
                    textarea.rows = 2;
                    textarea.value = value;
                    textarea.id = 'field-' + field;
                    div.appendChild(label);
                    div.appendChild(textarea);
                } else {
                    input.type = 'text';
                    input.value = value;
                    input.id = 'field-' + field;
                    div.appendChild(label);
                    div.appendChild(input);
                }
                container.appendChild(div);
            });
            previewCard.classList.remove('hidden');
            saveBtn.textContent = '🔄 Atualizar';
            editingId = ev.id;
            previewCard.scrollIntoView({ behavior: 'smooth' });
        }

        function collectPreviewData() {
            const data = {};
            DB_FIELDS.forEach(field => {
                const el = document.getElementById('field-' + field);
                if (el) data[field] = el.value.trim();
            });
            return data;
        }

        function resetPreview() {
            previewCard.classList.add('hidden');
            editingId = null;
            saveBtn.textContent = '💾 Salvar';
            fieldsContainer.innerHTML = '';
        }

        // ----- EVENTOS UI -----
        parseBtn.addEventListener('click', () => {
            const raw = rawInput.value.trim();
            if (!raw) {
                showToast('Cole uma mensagem primeiro');
                return;
            }
            const parsed = parseMessage(raw);
            const container = fieldsContainer;
            container.innerHTML = '';
            DB_FIELDS.forEach(field => {
                const value = parsed[field] || '';
                const div = document.createElement('div');
                div.className = 'field' + (field === 'observacao' || field === 'obs' ? ' field-full' : '');
                const label = document.createElement('label');
                label.textContent = FIELD_LABELS[field] || field;
                const input = document.createElement('input');
                if (field === 'observacao' || field === 'obs') {
                    const textarea = document.createElement('textarea');
                    textarea.rows = 2;
                    textarea.value = value;
                    textarea.id = 'field-' + field;
                    div.appendChild(label);
                    div.appendChild(textarea);
                } else {
                    input.type = 'text';
                    input.value = value;
                    input.id = 'field-' + field;
                    div.appendChild(label);
                    div.appendChild(input);
                }
                container.appendChild(div);
            });
            previewCard.classList.remove('hidden');
            saveBtn.textContent = '💾 Salvar';
            editingId = null;
            previewCard.scrollIntoView({ behavior: 'smooth' });
        });

        cancelPreviewBtn.addEventListener('click', resetPreview);

        saveBtn.addEventListener('click', async () => {
            const data = collectPreviewData();
            const hasData = DB_FIELDS.some(f => data[f] && data[f].trim() !== '');
            if (!hasData) {
                showToast('Preencha ao menos um campo');
                return;
            }
            try {
                if (editingId) {
                    await updateDoc(doc(db, 'agendamentos', editingId), data);
                    showToast('Agendamento atualizado!');
                } else {
                    await addDoc(eventsCollection, data);
                    showToast('Agendamento salvo!');
                }
                resetPreview();
                rawInput.value = '';
            } catch (e) {
                showToast('Erro ao salvar: ' + e.message);
                console.error(e);
            }
        });

        prevMonthBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar(allEvents, currentDate.getFullYear(), currentDate.getMonth());
        });
        nextMonthBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar(allEvents, currentDate.getFullYear(), currentDate.getMonth());
        });

        // ----- SINCRONIZAÇÃO MANUAL (FORÇAR RECARGA) -----
        forceSyncBtn.addEventListener('click', async () => {
            showToast('Forçando sincronização...');
            try {
                // Desconectar e reconectar o snapshot? Vamos apenas recarregar manualmente
                if (unsubscribe) {
                    unsubscribe();
                    unsubscribe = null;
                }
                // Nova consulta
                const q = query(eventsCollection, orderBy('data'));
                unsubscribe = onSnapshot(q, (snapshot) => {
                    const events = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        data.id = doc.id;
                        events.push(data);
                    });
                    allEvents = events;
                    renderCalendar(events, currentDate.getFullYear(), currentDate.getMonth());
                    setSyncStatus('online');
                    showToast('Sincronizado!', 1200);
                }, (error) => {
                    console.error('Erro no snapshot:', error);
                    setSyncStatus('error');
                    showToast('Erro de conexão: ' + error.message);
                });
            } catch (e) {
                showToast('Erro: ' + e.message);
            }
        });

        // ----- INICIALIZAÇÃO FIREBASE (snapshot) -----
        function initFirebaseListener() {
            // Consulta sem orderBy para evitar erros se alguns docs não tiverem campo 'data'
            // Mas podemos usar orderBy com tratamento
            const q = query(eventsCollection, orderBy('data'));
            unsubscribe = onSnapshot(q, (snapshot) => {
                const events = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    events.push(data);
                });
                allEvents = events;
                console.log('Eventos recebidos do Firebase:', events.length);
                renderCalendar(events, currentDate.getFullYear(), currentDate.getMonth());
                setSyncStatus('online');
                // Não mostrar toast a cada atualização para não poluir
            }, (error) => {
                console.error('Erro no snapshot:', error);
                setSyncStatus('error');
                showToast('Erro de sincronização: ' + error.message);
                // Tenta novamente após 5 segundos?
                setTimeout(() => {
                    if (unsubscribe) {
                        unsubscribe();
                        unsubscribe = null;
                    }
                    initFirebaseListener();
                }, 5000);
            });
        }

        // ----- INICIALIZAÇÃO -----
        const now = new Date();
        currentDate = new Date(now.getFullYear(), now.getMonth(), 1);
        const todayStr = formatDateKey(now.getFullYear(), now.getMonth(), now.getDate());
        selectedDate = todayStr;

        // Inicia listener
        initFirebaseListener();

        console.log('App iniciado. Aguardando dados do Firebase...');
    </script>
</body>
</html>
