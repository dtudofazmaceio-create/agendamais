<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agenda Profissional</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body {
            background: #f1f5f9;
            color: #0a1e2f;
            padding: 16px;
        }
        .container { max-width: 720px; margin: 0 auto; }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3a5f, #2b5a8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header h1::before { content: '📋'; -webkit-text-fill-color: initial; }
        .sync-status {
            background: #e9edf2;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e3a5f;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 10px; height:10px; border-radius:50%; display:inline-block; }
        .dot.online { background: #2ecc71; }
        .dot.offline { background: #f39c12; }
        .dot.error { background: #e74c3c; }
        .btn-sync {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #1e3a5f;
            padding: 0 4px;
        }

        /* ===== CARDS ===== */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 30px rgba(0,20,40,0.06);
            border: 1px solid #e2e8f0;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge {
            background: #dde7f5;
            color: #1e3a5f;
            font-size: 0.7rem;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 500;
        }

        /* ===== CALENDÁRIO ===== */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .calendar-nav button {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #1e3a5f;
            padding: 0 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .calendar-nav button:hover { color: #2b5a8a; }
        .month-year {
            font-weight: 600;
            font-size: 1.2rem;
            color: #0a1e2f;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .weekday {
            font-size: 0.7rem;
            font-weight: 600;
            color: #6b7f93;
            padding: 6px 0;
        }
        .day {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            transition: 0.15s;
            position: relative;
            font-size: 0.9rem;
        }
        .day:hover { background: #edf2f7; }
        .day.other-month { color: #b8c9dc; }
        .day.today { background: #e6edf6; font-weight: 700; }
        .day.has-event::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #2b5a8a;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
        }
        .day.has-event.done::after { background: #2ecc71; }
        .day.selected { background: #1e3a5f; color: white; }
        .day.selected.has-event::after { background: white; }

        /* Lista de eventos do dia */
        .day-events {
            margin-top: 16px;
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
        }
        .day-events .empty {
            color: #8a9bb0;
            text-align: center;
            padding: 12px 0;
        }
        .event-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
            border-left: 4px solid #2b5a8a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .event-item.done { border-left-color: #2ecc71; background: #f0faf4; }
        .event-item .info {
            flex: 1;
            cursor: pointer;
        }
        .event-item .info .name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .event-item .info .name .status-badge {
            font-size: 0.6rem;
            background: #e2e8f0;
            padding: 1px 10px;
            border-radius: 30px;
            color: #4a5b72;
        }
        .event-item .info .name .status-badge.done {
            background: #2ecc71;
            color: white;
        }
        .event-item .info .detail {
            font-size: 0.8rem;
            color: #4a5b72;
        }
        .event-item .actions {
            display: flex;
            gap: 6px;
        }
        .event-item .actions button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .event-item .actions button:hover { background: #e2e8f0; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,30,47,0.5);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: white;
            border-radius: 32px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            transform: scale(0.95);
            transition: transform 0.3s;
        }
        .modal-overlay.open .modal { transform: scale(1); }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 16px;
        }
        .modal-header h2 {
            font-size: 1.4rem;
            color: #0a1e2f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-header .status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            background: #e2e8f0;
            color: #4a5b72;
        }
        .modal-header .status-badge.done {
            background: #2ecc71;
            color: white;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #6b7f93;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover { color: #0a1e2f; }
        .modal-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 20px;
        }
        .modal-field {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 6px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .modal-field .label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #6b7f93;
        }
        .modal-field .value {
            font-size: 0.95rem;
            color: #0a1e2f;
            font-weight: 500;
            word-break: break-word;
        }
        .modal-field .value.empty { color: #b8c9dc; font-weight: 400; }
        .modal-field.full { grid-column: 1 / -1; }
        .modal-actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 120px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-primary:hover { background: #2b5a8a; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-success:hover { background: #27ae60; }
        .btn-secondary { background: #e2e8f0; color: #1e3a5f; }
        .btn-secondary:hover { background: #d0d8e3; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== FORMULÁRIO ===== */
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 1px solid #d0d8e3;
            border-radius: 16px;
            font-size: 0.95rem;
            background: #fafcff;
            resize: vertical;
            transition: 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #2b5a8a;
            box-shadow: 0 0 0 3px rgba(43,90,138,0.12);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-group .btn { flex: 1; }

        .extracted-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
            margin: 16px 0;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .field label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6b7f93;
        }
        .field input, .field textarea {
            padding: 8px 12px;
            border: 1px solid #d0d8e3;
            border-radius: 10px;
            font-size: 0.9rem;
            background: #fafcff;
        }
        .field input:focus, .field textarea:focus {
            outline: none;
            border-color: #2b5a8a;
        }
        .field-full { grid-column: 1 / -1; }
        .hidden { display: none !important; }

        /* ===== EXPORTAÇÃO PDF ===== */
        .export-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-top: 12px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            border: 1px dashed #d0d8e3;
        }
        .export-section label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e3a5f;
        }
        .export-section input[type="date"] {
            padding: 8px 12px;
            border: 1px solid #d0d8e3;
            border-radius: 10px;
            font-size: 0.9rem;
            background: white;
            color: #0a1e2f;
        }
        .export-section .btn {
            flex: 0 1 auto;
            padding: 10px 24px;
            background: #1e3a5f;
            color: white;
        }
        .export-section .btn:hover { background: #2b5a8a; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a1e2f;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2000;
        }
        .toast.show { opacity: 1; }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 500px) {
            .extracted-fields { grid-template-columns: 1fr; }
            .modal-body { grid-template-columns: 1fr; }
            .modal { padding: 20px; }
            .header h1 { font-size: 1.4rem; }
            .export-section { flex-direction: column; align-items: stretch; }
            .export-section input[type="date"] { width: 100%; }
        }

        /* Elemento para captura do PDF */
        #pdfContent {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 800px;
            background: white;
            padding: 40px;
            font-family: 'Inter', sans-serif;
            color: #0a1e2f;
            z-index: -1;
            opacity: 0;
            pointer-events: none;
            transition: none;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <h1>Agenda <span style="font-weight:300;color:#6b7f93; -webkit-text-fill-color:#6b7f93;">Profissional</span></h1>
        <div class="sync-status">
            <span class="dot online" id="syncDot"></span>
            <span id="syncLabel">Sincronizado</span>
            <button class="btn-sync" id="forceSyncBtn">🔄</button>
        </div>
    </div>

    <!-- CALENDÁRIO -->
    <div class="card">
        <div class="card-title">
            📆 Calendário
            <span class="badge" id="eventCount">0 eventos</span>
        </div>
        <div class="calendar-nav">
            <button id="prevMonth">◀</button>
            <span class="month-year" id="monthYear">Maio 2026</span>
            <button id="nextMonth">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="day-events" id="dayEvents">
            <div class="empty">Selecione um dia</div>
        </div>
    </div>

    <!-- EXPORTAR PDF -->
    <div class="card">
        <div class="card-title">📄 Exportar relatório PDF</div>
        <div class="export-section">
            <label for="startDate">Data inicial:</label>
            <input type="date" id="startDate">
            <label for="endDate">Data final:</label>
            <input type="date" id="endDate">
            <button class="btn" id="exportPdfBtn">⬇️ Gerar PDF</button>
        </div>
    </div>

    <!-- NOVO AGENDAMENTO -->
    <div class="card">
        <div class="card-title">✏️ Novo agendamento</div>
        <textarea id="rawInput" placeholder="Cole a mensagem bagunçada...&#10;Ex: Data: 19/07&#10;Responsável: João&#10;Tema: Aniversário..."></textarea>
        <button class="btn btn-primary" id="parseBtn">🔍 Interpretar</button>
        <div id="previewCard" class="hidden" style="margin-top:16px;">
            <div id="fieldsContainer" class="extracted-fields"></div>
            <div class="btn-group">
                <button class="btn btn-success" id="saveBtn">💾 Salvar</button>
                <button class="btn btn-secondary" id="cancelPreviewBtn">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">📋 Detalhes</h2>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-actions" id="modalActions">
            <button class="btn btn-success" id="toggleDoneBtn">✅ Marcar como concluído</button>
            <button class="btn btn-secondary" id="editFromModalBtn">✏️ Editar</button>
            <button class="btn btn-danger" id="deleteFromModalBtn">🗑️ Excluir</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- ELEMENTO PARA PDF -->
<div id="pdfContent"></div>

<script type="module">
    // ============================================================
    // IMPORTS
    // ============================================================
    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, query, orderBy } from 'firebase/firestore';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';

    // ============================================================
    // CONFIGURAÇÃO FIREBASE
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDMwdtyx3zWHwCHtalq572E_FyrF4f-drM",
        authDomain: "corretorpro-84422.firebaseapp.com",
        projectId: "corretorpro-84422",
        storageBucket: "corretorpro-84422.firebasestorage.app",
        messagingSenderId: "577827555644",
        appId: "1:577827555644:web:6394517f3ba8a8230ab639",
        measurementId: "G-YWXW1KFCW1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // 🔥 DEFINIÇÃO DA COLEÇÃO (GLOBAL NO MÓDULO)
    const eventsCollection = collection(db, 'agendamentos');

    // Autenticação anônima
    signInAnonymously(auth)
        .then(() => console.log('✅ Autenticado anonimamente'))
        .catch((err) => console.warn('⚠️ Falha na autenticação anônima:', err));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log('Usuário autenticado UID:', user.uid);
            setSyncStatus('online');
        } else {
            console.log('Usuário não autenticado');
            setSyncStatus('offline');
        }
    });

    // ============================================================
    // ESTADO GLOBAL
    // ============================================================
    let allEvents = [];
    let currentDate = new Date();
    let selectedDate = null;
    let editingId = null;
    let unsubscribe = null;
    let isSaving = false;
    let currentModalId = null;

    // DOM refs
    const calendarGrid = document.getElementById('calendarGrid');
    const monthYear = document.getElementById('monthYear');
    const dayEventsDiv = document.getElementById('dayEvents');
    const rawInput = document.getElementById('rawInput');
    const parseBtn = document.getElementById('parseBtn');
    const previewCard = document.getElementById('previewCard');
    const fieldsContainer = document.getElementById('fieldsContainer');
    const saveBtn = document.getElementById('saveBtn');
    const cancelPreviewBtn = document.getElementById('cancelPreviewBtn');
    const prevMonthBtn = document.getElementById('prevMonth');
    const nextMonthBtn = document.getElementById('nextMonth');
    const toast = document.getElementById('toast');
    const syncDot = document.getElementById('syncDot');
    const syncLabel = document.getElementById('syncLabel');
    const eventCount = document.getElementById('eventCount');
    const forceSyncBtn = document.getElementById('forceSyncBtn');
    const detailModal = document.getElementById('detailModal');
    const modalBody = document.getElementById('modalBody');
    const modalTitle = document.getElementById('modalTitle');
    const modalClose = document.getElementById('modalClose');
    const toggleDoneBtn = document.getElementById('toggleDoneBtn');
    const editFromModalBtn = document.getElementById('editFromModalBtn');
    const deleteFromModalBtn = document.getElementById('deleteFromModalBtn');
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const pdfElement = document.getElementById('pdfContent');

    // ============================================================
    // TOAST E SYNC STATUS
    // ============================================================
    function showToast(msg, duration = 2500) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function setSyncStatus(state) {
        syncDot.className = 'dot ' + state;
        const labels = { online: 'Sincronizado', offline: 'Offline', error: 'Erro' };
        syncLabel.textContent = labels[state] || 'Sincronizado';
    }

    // ============================================================
    // FORMATAÇÃO DE DATA
    // ============================================================
    function formatDateKey(year, month, day) {
        return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function formatDisplayDate(dateStr) {
        try {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
        } catch { return dateStr; }
    }

    function parseDateFromString(str) {
        str = str.trim();
        if (!str) return null;
        const slashParts = str.split('/');
        if (slashParts.length >= 2) {
            let day = parseInt(slashParts[0]);
            let month = parseInt(slashParts[1]) - 1;
            let year = slashParts.length === 3 ? parseInt(slashParts[2]) : new Date().getFullYear();
            if (slashParts.length === 3 && year < 100) year += 2000;
            if (!isNaN(day) && !isNaN(month) && !isNaN(year)) return { year, month, day };
        }
        const monthNames = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
        const regex = /(\d{1,2})\s+de\s+(\w+)(?:\s+de\s+(\d{4}))?/i;
        const match = str.match(regex);
        if (match) {
            const day = parseInt(match[1]);
            const monthName = match[2].toLowerCase();
            const monthIndex = monthNames.indexOf(monthName);
            if (monthIndex !== -1) {
                const year = match[3] ? parseInt(match[3]) : new Date().getFullYear();
                return { year, month: monthIndex, day };
            }
        }
        const iso = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (iso) return { year: parseInt(iso[1]), month: parseInt(iso[2])-1, day: parseInt(iso[3]) };
        return null;
    }

    function normalizeDate(raw) {
        const parsed = parseDateFromString(raw);
        return parsed ? formatDateKey(parsed.year, parsed.month, parsed.day) : null;
    }

    // ============================================================
    // KEYWORDS E PARSER
    // ============================================================
    const KEYWORD_MAP = {
        'data':'data','responsável':'responsavel','responsavel':'responsavel','resp':'responsavel',
        'celular':'celular','cel':'celular','telefone':'celular',
        'tema':'tema','local':'local','valor pago':'valor_pago','valor':'valor_pago','pagamento':'valor_pago',
        'observações':'observacao','observacao':'observacao','obs':'obs','observação':'observacao',
        'valor restante':'valor_restante','restante':'valor_restante',
        'pacote':'pacote','pacote contratado':'pacote',
        'hora de início':'hora_inicio','hora inicio':'hora_inicio','hora':'hora_inicio','início':'hora_inicio',
        'aniversariante':'aniversariante','nome':'aniversariante'
    };
    const DB_FIELDS = ['data','responsavel','celular','tema','hora_inicio','local','valor_pago','pacote','observacao','valor_restante','aniversariante','obs'];
    const FIELD_LABELS = {
        data:'Data', responsavel:'Responsável', celular:'Celular', tema:'Tema',
        hora_inicio:'Hora de início', local:'Local', valor_pago:'Valor pago',
        pacote:'Pacote', observacao:'Observação', valor_restante:'Valor restante',
        aniversariante:'Aniversariante', obs:'Obs.'
    };
    const FIELD_ICONS = {
        data:'📅', responsavel:'👤', celular:'📱', tema:'🎯',
        hora_inicio:'🕐', local:'📍', valor_pago:'💰',
        pacote:'📦', observacao:'📝', valor_restante:'💳',
        aniversariante:'🎂', obs:'📌'
    };

    function mapKey(rawKey) {
        const clean = rawKey.toLowerCase().replace(/[^a-záéíóúàâêôãõç ]/g,'').trim();
        if (KEYWORD_MAP[clean]) return KEYWORD_MAP[clean];
        for (let p in KEYWORD_MAP) if (clean.includes(p) || p.includes(clean)) return KEYWORD_MAP[p];
        return null;
    }

    function parseMessage(text) {
        const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>0);
        const result = {};
        let currentKey = null, currentValue = '';
        for (let line of lines) {
            const colon = line.indexOf(':');
            if (colon !== -1) {
                if (currentKey) { result[currentKey] = currentValue.trim(); currentKey = null; currentValue = ''; }
                const key = line.substring(0, colon).trim();
                const value = line.substring(colon+1).trim();
                const mapped = mapKey(key);
                if (mapped) {
                    if (mapped === 'observacao' || mapped === 'obs') { currentKey = mapped; currentValue = value; }
                    else {
                        if (mapped === 'data') {
                            const norm = normalizeDate(value);
                            result[mapped] = norm || value;
                        } else result[mapped] = value;
                    }
                } else {
                    if (currentKey) currentValue += ' ' + line;
                    else { if (!result.observacao) result.observacao = ''; result.observacao += ' ' + line; }
                }
            } else {
                if (currentKey) currentValue += ' ' + line;
                else { if (!result.observacao) result.observacao = ''; result.observacao += ' ' + line; }
            }
        }
        if (currentKey) result[currentKey] = currentValue.trim();
        for (let k in result) result[k] = result[k].trim();
        if (!result.data) {
            for (let line of lines) {
                const parsed = parseDateFromString(line);
                if (parsed) { result.data = formatDateKey(parsed.year, parsed.month, parsed.day); break; }
            }
        }
        return result;
    }

    // ============================================================
    // RENDER CALENDÁRIO
    // ============================================================
    function renderCalendar(events, year, month) {
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        const today = new Date();
        const todayStr = formatDateKey(today.getFullYear(), today.getMonth(), today.getDate());

        const eventsMap = {};
        events.forEach(ev => {
            if (ev.data && /^\d{4}-\d{2}-\d{2}$/.test(ev.data)) {
                if (!eventsMap[ev.data]) eventsMap[ev.data] = [];
                eventsMap[ev.data].push(ev);
            }
        });

        let html = '';
        const weekdays = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
        weekdays.forEach(w => html += `<div class="weekday">${w}</div>`);

        const startOffset = firstDay;
        for (let i = daysInPrevMonth - startOffset + 1; i <= daysInPrevMonth; i++) {
            html += `<div class="day other-month">${i}</div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateKey = formatDateKey(year, month, d);
            const isToday = dateKey === todayStr;
            const eventsOnDay = eventsMap[dateKey] || [];
            const hasEvent = eventsOnDay.length > 0;
            const allDone = hasEvent && eventsOnDay.every(e => e.concluido === true);
            const isSelected = dateKey === selectedDate;
            let classes = 'day';
            if (isToday) classes += ' today';
            if (hasEvent) classes += ' has-event';
            if (allDone && hasEvent) classes += ' done';
            if (isSelected) classes += ' selected';
            html += `<div class="${classes}" data-date="${dateKey}">${d}</div>`;
        }

        const totalCells = startOffset + daysInMonth;
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let d = 1; d <= remaining; d++) {
            html += `<div class="day other-month">${d}</div>`;
        }

        calendarGrid.innerHTML = html;
        monthYear.textContent = new Date(year, month).toLocaleDateString('pt-BR', { month:'long', year:'numeric' });

        let count = 0;
        for (let d = 1; d <= daysInMonth; d++) {
            const dateKey = formatDateKey(year, month, d);
            if (eventsMap[dateKey]) count += eventsMap[dateKey].length;
        }
        eventCount.textContent = count + ' evento' + (count !== 1 ? 's' : '');

        document.querySelectorAll('.day:not(.other-month)').forEach(el => {
            el.addEventListener('click', () => {
                const date = el.dataset.date;
                if (date) { selectedDate = date; renderCalendar(events, year, month); renderDayEvents(events, date); }
            });
        });

        if (selectedDate) renderDayEvents(events, selectedDate);
        else {
            const firstEventDate = Object.keys(eventsMap).sort()[0];
            selectedDate = firstEventDate || todayStr;
            renderCalendar(events, year, month);
        }
    }

    // ============================================================
    // RENDER EVENTOS DO DIA
    // ============================================================
    function renderDayEvents(events, dateKey) {
        const filtered = events.filter(ev => ev.data === dateKey);
        if (filtered.length === 0) {
            dayEventsDiv.innerHTML = `<div class="empty">📭 Nenhum agendamento para ${formatDisplayDate(dateKey)}</div>`;
            return;
        }
        let html = `<div style="margin-bottom:8px;font-weight:500;">📋 ${filtered.length} agendamento(s) em ${formatDisplayDate(dateKey)}</div>`;
        filtered.forEach(ev => {
            const nome = ev.aniversariante || 'Evento';
            const resp = ev.responsavel || '';
            const local = ev.local || '';
            const hora = ev.hora_inicio || '';
            const done = ev.concluido === true;
            const id = ev.id;
            html += `
                <div class="event-item ${done ? 'done' : ''}">
                    <div class="info" data-id="${id}">
                        <div class="name">
                            ${done ? '✅' : '🎉'} ${nome}
                            <span class="status-badge ${done ? 'done' : ''}">${done ? 'Concluído' : 'Pendente'}</span>
                        </div>
                        <div class="detail">${resp} ${local ? '· ' + local : ''} ${hora ? '· ' + hora : ''}</div>
                    </div>
                    <div class="actions">
                        <button data-id="${id}" class="edit-btn" title="Editar">✏️</button>
                        <button data-id="${id}" class="delete-btn" title="Excluir">🗑️</button>
                    </div>
                </div>
            `;
        });
        dayEventsDiv.innerHTML = html;

        document.querySelectorAll('.event-item .info').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.dataset.id;
                const ev = allEvents.find(e => e.id === id);
                if (ev) openDetailModal(ev);
            });
        });

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const ev = allEvents.find(e => e.id === id);
                if (ev) loadEventForEdit(ev);
            });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                if (!confirm('Excluir este agendamento?')) return;
                try {
                    await deleteDoc(doc(db, 'agendamentos', id));
                    showToast('Excluído com sucesso');
                } catch (err) {
                    showToast('Erro ao excluir: ' + err.message);
                }
            });
        });
    }

    // ============================================================
    // MODAL
    // ============================================================
    function openDetailModal(ev) {
        currentModalId = ev.id;
        const done = ev.concluido === true;
        modalTitle.innerHTML = `${done ? '✅' : '📋'} ${ev.aniversariante || 'Evento'}`;

        let bodyHTML = '';
        DB_FIELDS.forEach(field => {
            const value = ev[field] || '';
            const label = FIELD_LABELS[field] || field;
            const icon = FIELD_ICONS[field] || '';
            const display = value || '—';
            const isEmpty = !value;
            const full = field === 'observacao' || field === 'obs';
            bodyHTML += `
                <div class="modal-field ${full ? 'full' : ''}">
                    <div class="label">${icon} ${label}</div>
                    <div class="value ${isEmpty ? 'empty' : ''}">${display}</div>
                </div>
            `;
        });
        modalBody.innerHTML = bodyHTML;

        toggleDoneBtn.textContent = done ? '↩️ Reabrir' : '✅ Marcar como concluído';
        toggleDoneBtn.className = `btn ${done ? 'btn-secondary' : 'btn-success'}`;
        detailModal.classList.add('open');
    }

    function closeDetailModal() {
        detailModal.classList.remove('open');
        currentModalId = null;
    }

    toggleDoneBtn.addEventListener('click', async () => {
        if (!currentModalId) return;
        const ev = allEvents.find(e => e.id === currentModalId);
        if (!ev) return;
        const newStatus = ev.concluido !== true;
        try {
            await updateDoc(doc(db, 'agendamentos', currentModalId), { concluido: newStatus });
            showToast(newStatus ? '✅ Marcado como concluído' : '↩️ Reaberto');
            closeDetailModal();
        } catch (err) {
            showToast('Erro: ' + err.message);
        }
    });

    editFromModalBtn.addEventListener('click', () => {
        if (!currentModalId) return;
        const ev = allEvents.find(e => e.id === currentModalId);
        if (ev) {
            closeDetailModal();
            loadEventForEdit(ev);
        }
    });

    deleteFromModalBtn.addEventListener('click', async () => {
        if (!currentModalId) return;
        if (!confirm('Excluir este agendamento?')) return;
        try {
            await deleteDoc(doc(db, 'agendamentos', currentModalId));
            showToast('Excluído');
            closeDetailModal();
        } catch (err) {
            showToast('Erro: ' + err.message);
        }
    });

    modalClose.addEventListener('click', closeDetailModal);
    detailModal.addEventListener('click', (e) => {
        if (e.target === detailModal) closeDetailModal();
    });

    // ============================================================
    // EDIÇÃO / PREVIEW
    // ============================================================
    function loadEventForEdit(ev) {
        const container = fieldsContainer;
        container.innerHTML = '';
        DB_FIELDS.forEach(field => {
            const value = ev[field] || '';
            const div = document.createElement('div');
            div.className = 'field' + (field === 'observacao' || field === 'obs' ? ' field-full' : '');
            const label = document.createElement('label');
            label.textContent = FIELD_LABELS[field] || field;
            if (field === 'observacao' || field === 'obs') {
                const textarea = document.createElement('textarea');
                textarea.rows = 2;
                textarea.value = value;
                textarea.id = 'field-' + field;
                div.appendChild(label); div.appendChild(textarea);
            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.value = value;
                input.id = 'field-' + field;
                div.appendChild(label); div.appendChild(input);
            }
            container.appendChild(div);
        });
        previewCard.classList.remove('hidden');
        saveBtn.textContent = '🔄 Atualizar';
        editingId = ev.id;
        previewCard.scrollIntoView({ behavior: 'smooth' });
    }

    function collectPreviewData() {
        const data = {};
        DB_FIELDS.forEach(field => {
            const el = document.getElementById('field-' + field);
            if (el) data[field] = el.value.trim();
        });
        return data;
    }

    function resetPreview() {
        previewCard.classList.add('hidden');
        editingId = null;
        saveBtn.textContent = '💾 Salvar';
        fieldsContainer.innerHTML = '';
    }

    parseBtn.addEventListener('click', () => {
        const raw = rawInput.value.trim();
        if (!raw) { showToast('Cole uma mensagem'); return; }
        const parsed = parseMessage(raw);
        const container = fieldsContainer;
        container.innerHTML = '';
        DB_FIELDS.forEach(field => {
            const value = parsed[field] || '';
            const div = document.createElement('div');
            div.className = 'field' + (field === 'observacao' || field === 'obs' ? ' field-full' : '');
            const label = document.createElement('label');
            label.textContent = FIELD_LABELS[field] || field;
            if (field === 'observacao' || field === 'obs') {
                const textarea = document.createElement('textarea');
                textarea.rows = 2;
                textarea.value = value;
                textarea.id = 'field-' + field;
                div.appendChild(label); div.appendChild(textarea);
            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.value = value;
                input.id = 'field-' + field;
                div.appendChild(label); div.appendChild(input);
            }
            container.appendChild(div);
        });
        previewCard.classList.remove('hidden');
        saveBtn.textContent = '💾 Salvar';
        editingId = null;
        previewCard.scrollIntoView({ behavior: 'smooth' });
    });

    cancelPreviewBtn.addEventListener('click', resetPreview);

    saveBtn.addEventListener('click', async () => {
        if (isSaving) return;
        const data = collectPreviewData();
        const hasData = DB_FIELDS.some(f => data[f] && data[f].trim() !== '');
        if (!hasData) { showToast('Preencha ao menos um campo'); return; }
        if (data.data) {
            const norm = normalizeDate(data.data);
            if (norm) data.data = norm;
        }
        if (!data.data) { showToast('Data é obrigatória'); return; }

        isSaving = true;
        saveBtn.disabled = true;
        try {
            if (editingId) {
                await updateDoc(doc(db, 'agendamentos', editingId), data);
                showToast('Atualizado!');
            } else {
                await addDoc(eventsCollection, data);
                showToast('Salvo!');
            }
            resetPreview();
            rawInput.value = '';
        } catch (err) {
            showToast('Erro ao salvar: ' + err.message);
            console.error(err);
        } finally {
            isSaving = false;
            saveBtn.disabled = false;
        }
    });

    prevMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar(allEvents, currentDate.getFullYear(), currentDate.getMonth());
    });
    nextMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar(allEvents, currentDate.getFullYear(), currentDate.getMonth());
    });

    forceSyncBtn.addEventListener('click', () => {
        showToast('Recarregando...');
        if (unsubscribe) { unsubscribe(); unsubscribe = null; }
        initFirebaseListener();
    });

    // ============================================================
    // EXPORTAÇÃO PDF
    // ============================================================
    function generatePDFContent(startDate, endDate, events) {
        const sorted = [...events].sort((a, b) => a.data.localeCompare(b.data));

        const now = new Date();
        const dateStr = now.toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
        const timeStr = now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

        let rows = '';
        if (sorted.length === 0) {
            rows = `<tr><td colspan="6" style="text-align:center;padding:20px;color:#6b7f93;">Nenhum agendamento encontrado no período.</td></tr>`;
        } else {
            sorted.forEach(ev => {
                const status = ev.concluido ? '✅ Concluído' : '⏳ Pendente';
                rows += `
                    <tr>
                        <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;">${formatDisplayDate(ev.data)}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;">${ev.responsavel || '—'}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;">${ev.tema || '—'}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;">${ev.local || '—'}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;">${ev.valor_pago || '—'}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;font-weight:500;color:${ev.concluido ? '#2ecc71' : '#e74c3c'};">${status}</td>
                    </tr>
                `;
            });
        }

        return `
            <div style="font-family: 'Inter', sans-serif; color: #0a1e2f; max-width: 800px; margin: 0 auto;">
                <div style="background: linear-gradient(135deg, #1e3a5f, #2b5a8a); padding: 30px 40px; border-radius: 16px 16px 0 0; color: white;">
                    <h1 style="font-size: 28px; font-weight: 700; margin: 0;">📋 Relatório de Agendamentos</h1>
                    <p style="margin: 8px 0 0; opacity: 0.9; font-size: 16px;">
                        Período: ${formatDisplayDate(startDate)} a ${formatDisplayDate(endDate)}
                    </p>
                </div>
                <div style="background: white; padding: 30px 40px; border-radius: 0 0 16px 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; border-top: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
                        <span style="font-weight: 600; color: #1e3a5f; font-size: 1.1rem;">Total de eventos: <span style="color: #2b5a8a;">${sorted.length}</span></span>
                        <span style="color: #6b7f93; font-size: 0.9rem;">Gerado em ${dateStr} às ${timeStr}</span>
                    </div>
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                        <thead>
                            <tr style="background: #f1f5f9; border-radius: 12px;">
                                <th style="padding: 10px 12px; text-align: left; font-weight: 600; color: #1e3a5f;">Data</th>
                                <th style="padding: 10px 12px; text-align: left; font-weight: 600; color: #1e3a5f;">Responsável</th>
                                <th style="padding: 10px 12px; text-align: left; font-weight: 600; color: #1e3a5f;">Tema</th>
                                <th style="padding: 10px 12px; text-align: left; font-weight: 600; color: #1e3a5f;">Local</th>
                                <th style="padding: 10px 12px; text-align: left; font-weight: 600; color: #1e3a5f;">Valor</th>
                                <th style="padding: 10px 12px; text-align: left; font-weight: 600; color: #1e3a5f;">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                    <div style="margin-top: 24px; padding-top: 16px; border-top: 2px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 0.8rem; color: #6b7f93;">
                        <span>Agenda Profissional — Relatório automático</span>
                        <span>Página 1/1</span>
                    </div>
                </div>
            </div>
        `;
    }

    exportPdfBtn.addEventListener('click', async () => {
        const start = startDateInput.value;
        const end = endDateInput.value;
        if (!start || !end) {
            showToast('Selecione o período inicial e final.');
            return;
        }
        if (start > end) {
            showToast('Data inicial não pode ser maior que a final.');
            return;
        }

        // Filtra eventos
        const filtered = allEvents.filter(ev => {
            if (!ev.data) return false;
            return ev.data >= start && ev.data <= end;
        });

        console.log(`📊 Eventos no período ${start} a ${end}: ${filtered.length}`);

        // Gera HTML
        const contentHTML = generatePDFContent(start, end, filtered);
        pdfElement.innerHTML = contentHTML;

        // Torna o elemento visível para captura (fora da tela)
        pdfElement.style.position = 'absolute';
        pdfElement.style.left = '-9999px';
        pdfElement.style.top = '0';
        pdfElement.style.width = '800px';
        pdfElement.style.background = 'white';
        pdfElement.style.padding = '40px';
        pdfElement.style.opacity = '1';
        pdfElement.style.pointerEvents = 'none';
        pdfElement.style.display = 'block';
        pdfElement.style.zIndex = '-1';

        await new Promise(resolve => setTimeout(resolve, 300));

        const opt = {
            margin:        [0.5, 0.5, 0.5, 0.5],
            filename:     `relatorio_agendamentos_${start}_a_${end}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, letterRendering: true, useCORS: true, logging: false },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        try {
            showToast('Gerando PDF...', 3000);
            await html2pdf().set(opt).from(pdfElement).save();
            showToast('PDF gerado com sucesso!');
        } catch (error) {
            console.error('Erro ao gerar PDF:', error);
            showToast('Erro ao gerar PDF: ' + error.message);
        } finally {
            pdfElement.innerHTML = '';
            pdfElement.style.display = 'none';
        }
    });

    // ============================================================
    // PERÍODO PADRÃO
    // ============================================================
    function setDefaultPeriod() {
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        const start = formatDateKey(firstDay.getFullYear(), firstDay.getMonth(), firstDay.getDate());
        const end = formatDateKey(lastDay.getFullYear(), lastDay.getMonth(), lastDay.getDate());
        startDateInput.value = start;
        endDateInput.value = end;
        console.log(`📅 Período padrão: ${start} a ${end}`);
    }
    setDefaultPeriod();

    // ============================================================
    // FIREBASE LISTENER
    // ============================================================
    function initFirebaseListener() {
        const q = query(eventsCollection, orderBy('data'));
        unsubscribe = onSnapshot(q, (snapshot) => {
            const events = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                data.id = doc.id;
                events.push(data);
            });
            allEvents = events;
            renderCalendar(events, currentDate.getFullYear(), currentDate.getMonth());
            setSyncStatus('online');
            console.log(`📥 Eventos carregados: ${events.length}`);
        }, (error) => {
            console.error('Firebase error:', error);
            setSyncStatus('error');
            showToast('Erro de sincronização: ' + error.message);
            setTimeout(() => {
                if (unsubscribe) { unsubscribe(); unsubscribe = null; }
                initFirebaseListener();
            }, 10000);
        });
    }

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    const now = new Date();
    currentDate = new Date(now.getFullYear(), now.getMonth(), 1);
    const todayStr = formatDateKey(now.getFullYear(), now.getMonth(), now.getDate());
    selectedDate = todayStr;
    initFirebaseListener();

    console.log('🚀 App pronto!');
</script>
